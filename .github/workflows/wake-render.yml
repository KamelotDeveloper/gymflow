name: Wake Render

on:
  schedule:
    # Every 10 minutes — Render free tier sleeps after 15 min of inactivity
    - cron: '*/10 * * * *'
  workflow_dispatch: # manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: curl -sS --max-time 15 https://gymflow-8ect.onrender.com/api/health
