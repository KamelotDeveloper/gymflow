name: Wake Render

on:
  schedule:
    # Every 10 minutes — Render free tier sleeps after 15 min of inactivity
    - cron: '*/10 * * * *'
  workflow_dispatch: # manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Health check (with retry for cold start)
        run: |
          for i in 1 2 3; do
            curl -sS --max-time 60 https://gymflow-8ect.onrender.com/api/health && exit 0
            echo "Attempt $i failed, sleeping 10s..."
            sleep 10
          done
          exit 1
